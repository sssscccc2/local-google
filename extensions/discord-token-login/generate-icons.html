<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #1a1a2e;
      color: white;
    }
    .icon-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .icon-box {
      text-align: center;
    }
    canvas {
      border: 1px solid #333;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      background: #5865f2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #4752c4;
    }
    h1 { margin-bottom: 20px; }
    p { color: #aaa; margin-bottom: 30px; }
  </style>
</head>
<body>
  <h1>Discord Token Login - Icon Generator</h1>
  <p>Bu səhifə extension üçün PNG ikonları yaratmağa kömək edir. Hər ölçü üçün "Download" düyməsini basın.</p>
  
  <div class="icon-container">
    <div class="icon-box">
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>16x16</p>
      <button onclick="downloadIcon(16)">Download</button>
    </div>
    <div class="icon-box">
      <canvas id="icon32" width="32" height="32"></canvas>
      <p>32x32</p>
      <button onclick="downloadIcon(32)">Download</button>
    </div>
    <div class="icon-box">
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>48x48</p>
      <button onclick="downloadIcon(48)">Download</button>
    </div>
    <div class="icon-box">
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>128x128</p>
      <button onclick="downloadIcon(128)">Download</button>
    </div>
  </div>
  
  <script>
    const sizes = [16, 32, 48, 128];
    
    function drawIcon(size) {
      const canvas = document.getElementById('icon' + size);
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#5865F2');
      gradient.addColorStop(1, '#7289DA');
      
      // Rounded rectangle background
      const radius = size * 0.18;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Discord logo (simplified for small sizes)
      ctx.fillStyle = 'white';
      const scale = size / 128;
      ctx.save();
      ctx.scale(scale, scale);
      
      // Draw simplified Discord controller/bot icon
      const path = new Path2D('M97.5 35.5C91.2 32.7 84.4 30.7 77.3 29.5C77.2 29.5 77.1 29.5 77.1 29.6C76.2 31.2 75.3 33.2 74.6 34.8C67 33.7 59.5 33.7 52.1 34.8C51.4 33.2 50.5 31.2 49.6 29.6C49.5 29.5 49.4 29.5 49.3 29.5C42.2 30.7 35.4 32.7 29.1 35.5C29.1 35.5 29 35.5 29 35.6C16.2 54.6 12.8 73.1 14.5 91.3C14.5 91.4 14.5 91.5 14.6 91.5C23.2 97.6 31.5 101.3 39.6 103.8C39.7 103.8 39.9 103.8 39.9 103.7C41.9 101 43.7 98.1 45.2 95.1C45.3 95 45.2 94.8 45.1 94.8C42.4 93.8 39.8 92.6 37.4 91.2C37.2 91.1 37.2 90.8 37.4 90.7C37.9 90.3 38.4 89.9 38.9 89.5C39 89.4 39.1 89.4 39.2 89.5C55.1 96.6 72.4 96.6 88.1 89.5C88.2 89.4 88.4 89.4 88.5 89.5C89 89.9 89.5 90.3 90 90.7C90.2 90.8 90.2 91.1 90 91.2C87.6 92.6 85 93.8 82.3 94.8C82.2 94.8 82.1 95 82.2 95.1C83.8 98.1 85.6 101 87.5 103.7C87.6 103.8 87.7 103.8 87.8 103.8C96 101.3 104.3 97.6 112.9 91.5C113 91.5 113 91.4 113 91.3C115 70.4 109.7 52.1 97.6 35.6C97.6 35.5 97.5 35.5 97.5 35.5ZM48.5 79.5C43.3 79.5 39 74.7 39 68.8C39 62.9 43.2 58.1 48.5 58.1C53.8 58.1 58.1 62.9 58 68.8C58 74.7 53.8 79.5 48.5 79.5ZM79 79.5C73.8 79.5 69.5 74.7 69.5 68.8C69.5 62.9 73.7 58.1 79 58.1C84.3 58.1 88.6 62.9 88.5 68.8C88.5 74.7 84.3 79.5 79 79.5Z');
      ctx.fill(path);
      
      ctx.restore();
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById('icon' + size);
      const link = document.createElement('a');
      link.download = 'icon' + size + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // Draw all icons on load
    sizes.forEach(drawIcon);
  </script>
</body>
</html>
