<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 指纹浏览器</title>
  <style>
    :root {
      --bg-primary: #0f0f11;
      --bg-secondary: #1a1a1f;
      --bg-card: #22222a;
      --border: #333340;
      --text-primary: #e8e8ed;
      --text-secondary: #9898a8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .login-container {
      width: 380px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .login-header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .login-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: var(--accent-hover);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
    }

    .status-bar {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .status-bar.connecting {
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">&#128274;</div>
      <h1>Fingerprint Browser</h1>
      <p>请登录以继续使用</p>
    </div>

    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="input-username" type="text" placeholder="请输入用户名" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" id="input-password" type="password" placeholder="请输入密码">
    </div>

    <button class="btn-login" id="btn-login">登 录</button>

    <div class="error-msg" id="error-msg"></div>
    <div class="status-bar" id="status-bar">服务器: 在线</div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    async function handleLogin() {
      const username = $('#input-username').value.trim();
      const password = $('#input-password').value;

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      const btn = $('#btn-login');
      btn.disabled = true;
      btn.textContent = '登录中...';
      hideError();

      try {
        const result = await window.authApi.login(username, password);
        if (result.success) {
          btn.textContent = '登录成功，正在加载...';
        } else {
          showError(result.error || '登录失败');
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      } catch (err) {
        showError('连接服务器失败，请检查网络');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    function showError(msg) {
      const el = $('#error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      $('#error-msg').classList.remove('visible');
    }

    $('#btn-login').addEventListener('click', handleLogin);

    $('#input-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    $('#input-username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#input-password').focus();
    });

    (async () => {
      const bar = $('#status-bar');
      bar.className = 'status-bar connecting';
      bar.textContent = '正在连接服务器...';
      try {
        const ok = await window.authApi.ping();
        bar.className = 'status-bar';
        bar.textContent = ok ? '服务器: 在线' : '服务器: 离线';
      } catch {
        bar.className = 'status-bar';
        bar.textContent = '服务器: 离线';
      }
    })();
  </script>
</body>
</html>
