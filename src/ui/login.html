<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 指纹浏览器</title>
  <style>
    :root {
      --bg-primary: #0f0f11;
      --bg-secondary: #1a1a1f;
      --bg-card: #22222a;
      --border: #333340;
      --text-primary: #e8e8ed;
      --text-secondary: #9898a8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .login-container {
      width: 380px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo { font-size: 36px; margin-bottom: 12px; }
    .login-header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .login-header p { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input {
      width: 100%; padding: 11px 14px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-primary); font-size: 14px; font-family: inherit;
      transition: border-color 0.15s; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }

    .btn-action {
      width: 100%; padding: 12px; color: white; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.15s; margin-top: 8px;
    }
    .btn-action.login-btn { background: var(--accent); }
    .btn-action.login-btn:hover { background: var(--accent-hover); }
    .btn-action.register-btn { background: var(--success); }
    .btn-action.register-btn:hover { background: #16a34a; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg-box {
      display: none; margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; text-align: center;
    }
    .msg-box.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
    .msg-box.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
    .msg-box.visible { display: block; }

    .switch-link {
      text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-secondary);
    }
    .switch-link a {
      color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .switch-link a:hover { text-decoration: underline; }

    .status-bar { text-align: center; margin-top: 12px; font-size: 11px; color: var(--text-secondary); }
    .status-bar.connecting { color: #f59e0b; }

    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">&#128274;</div>
      <h1>Fingerprint Browser</h1>
      <p id="header-desc">请登录以继续使用</p>
    </div>

    <!-- Login Page -->
    <div class="page active" id="page-login">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" id="login-username" type="text" placeholder="请输入用户名" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="login-password" type="password" placeholder="请输入密码">
      </div>
      <button class="btn-action login-btn" id="btn-login">登 录</button>
      <div class="msg-box" id="login-msg"></div>
      <div class="switch-link">还没有账号？<a id="link-to-register">立即注册</a></div>
    </div>

    <!-- Register Page -->
    <div class="page" id="page-register">
      <div class="form-group">
        <label class="form-label">用户名（字母数字下划线，2-30位）</label>
        <input class="form-input" id="reg-username" type="text" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label class="form-label">密码（至少4位）</label>
        <input class="form-input" id="reg-password" type="password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input class="form-input" id="reg-password2" type="password" placeholder="再次输入密码">
      </div>
      <button class="btn-action register-btn" id="btn-register">注 册</button>
      <div class="msg-box" id="reg-msg"></div>
      <div class="switch-link">已有账号？<a id="link-to-login">返回登录</a></div>
    </div>

    <div class="status-bar" id="status-bar">服务器: 在线</div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      $(`#page-${name}`).classList.add('active');
      $('#header-desc').textContent = name === 'login' ? '请登录以继续使用' : '注册新账号';
      hideMsgs();
    }

    function showMsg(id, msg, type) {
      const el = $(id);
      el.textContent = msg;
      el.className = `msg-box ${type} visible`;
    }

    function hideMsgs() {
      document.querySelectorAll('.msg-box').forEach(m => { m.classList.remove('visible'); });
    }

    // Login
    async function handleLogin() {
      const username = $('#login-username').value.trim();
      const password = $('#login-password').value;
      if (!username || !password) { showMsg('#login-msg', '请输入用户名和密码', 'error'); return; }

      const btn = $('#btn-login');
      btn.disabled = true;
      btn.textContent = '登录中...';
      hideMsgs();

      try {
        const result = await window.authApi.login(username, password);
        if (result.success) {
          btn.textContent = '登录成功，正在加载...';
        } else {
          showMsg('#login-msg', result.error || '登录失败', 'error');
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      } catch {
        showMsg('#login-msg', '连接服务器失败，请检查网络', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    // Register
    async function handleRegister() {
      const username = $('#reg-username').value.trim();
      const password = $('#reg-password').value;
      const password2 = $('#reg-password2').value;

      if (!username || !password) { showMsg('#reg-msg', '请填写所有字段', 'error'); return; }
      if (password !== password2) { showMsg('#reg-msg', '两次密码不一致', 'error'); return; }
      if (password.length < 4) { showMsg('#reg-msg', '密码至少 4 位', 'error'); return; }

      const btn = $('#btn-register');
      btn.disabled = true;
      btn.textContent = '注册中...';
      hideMsgs();

      try {
        const result = await window.authApi.register(username, password);
        if (result.success) {
          showMsg('#reg-msg', '注册成功！请返回登录', 'success');
          btn.textContent = '注 册';
          btn.disabled = false;
          $('#reg-username').value = '';
          $('#reg-password').value = '';
          $('#reg-password2').value = '';
        } else {
          showMsg('#reg-msg', result.error || '注册失败', 'error');
          btn.disabled = false;
          btn.textContent = '注 册';
        }
      } catch {
        showMsg('#reg-msg', '连接服务器失败', 'error');
        btn.disabled = false;
        btn.textContent = '注 册';
      }
    }

    $('#btn-login').addEventListener('click', handleLogin);
    $('#btn-register').addEventListener('click', handleRegister);
    $('#link-to-register').addEventListener('click', () => showPage('register'));
    $('#link-to-login').addEventListener('click', () => showPage('login'));

    $('#login-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    $('#login-username').addEventListener('keydown', e => { if (e.key === 'Enter') $('#login-password').focus(); });
    $('#reg-password2').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });

    (async () => {
      const bar = $('#status-bar');
      bar.className = 'status-bar connecting';
      bar.textContent = '正在连接服务器...';
      try {
        const ok = await window.authApi.ping();
        bar.className = 'status-bar';
        bar.textContent = ok ? '服务器: 在线' : '服务器: 离线';
      } catch {
        bar.className = 'status-bar';
        bar.textContent = '服务器: 离线';
      }
    })();
  </script>
</body>
</html>
